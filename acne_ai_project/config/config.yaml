project_name: "Acne AI - Intelligent Acne Detection System"

data:
  image_size: [380, 380]
  channels: 3
  batch_size: 16
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  num_classes: 5
  class_names: ["Blackheads", "Whiteheads", "Papules", "Pustules", "Cystic Acne"]

augmentation:
  rotation_range: 30
  width_shift_range: 0.2
  height_shift_range: 0.2
  brightness_range: [0.8, 1.2]
  contrast_range: [0.8, 1.2]
  zoom_range: [0.8, 1.2]
  horizontal_flip: true
  vertical_flip: false

model:
  backbone: "EfficientNetB4"
  dropout_rate: 0.5
  learning_rate_frozen: 0.001
  learning_rate_finetune: 0.00003
  epochs_frozen: 20
  epochs_finetune: 100
  optimizer: "adam"
  loss: "categorical_crossentropy"

paths:
  raw_data: "acne_ai_project/data/raw"
  processed_data: "acne_ai_project/data/processed"
  models: "acne_ai_project/models/saved"
  logs: "acne_ai_project/training/logs"
  exports: "acne_ai_project/export/web"

deployment:
  confidence_threshold: 0.6
  max_inference_time_ms: 3000
